
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caliper Pro</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:linear-gradient(135deg,#667eea,#764ba2);color:#222}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2)}
.title{font-weight:bold;font-size:22px;margin-bottom:10px}
.value{font-size:48px;font-weight:bold;text-align:center}
.btn{padding:12px 16px;border:none;border-radius:10px;background:#667eea;color:white;font-weight:bold;cursor:pointer}
.status{margin-bottom:10px;font-weight:bold}
.diff{font-size:56px;text-align:center;font-weight:bold}
.pass{color:#16a34a}
.warn{color:#ea580c}
.fail{color:#dc2626}
</style>
</head>
<body>
<div class="container">

<div class="card">
<div class="title">Caliper 1</div>
<div id="status1" class="status">Disconnected</div>
<div id="value1" class="value">--</div>
<button class="btn" onclick="connectCaliper(1)">Connect</button>
</div>

<div class="card">
<div class="title">Caliper 2</div>
<div id="status2" class="status">Disconnected</div>
<div id="value2" class="value">--</div>
<button class="btn" onclick="connectCaliper(2)">Connect</button>
</div>

<div class="card">
<div class="title">Difference</div>
<div id="difference" class="diff">--</div>
</div>

</div>

<script>
const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

let devices={1:{value:null,unit:null},2:{value:null,unit:null}};

async function connectCaliper(num){
 try{
  const device = await navigator.bluetooth.requestDevice({
   acceptAllDevices:true,
   optionalServices:[SERVICE_UUID]
  });

  const server = await device.gatt.connect();
  const service = await server.getPrimaryService(SERVICE_UUID);
  const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

  await characteristic.startNotifications();
  characteristic.addEventListener('characteristicvaluechanged',(event)=>{
    const value=new TextDecoder().decode(event.target.value);
    const data=JSON.parse(value);
    devices[num].value=data.value;
    devices[num].unit=data.unit;

    document.getElementById("value"+num).textContent=data.value.toFixed(3);
    updateDifference();
  });

  document.getElementById("status"+num).textContent="Connected";

 }catch(err){
  alert(err.message);
 }
}

function updateDifference(){
 if(devices[1].value==null||devices[2].value==null)return;
 const diff=devices[1].value-devices[2].value;
 const el=document.getElementById("difference");
 el.textContent=diff.toFixed(4);
}
</script>
</body>
</html>
